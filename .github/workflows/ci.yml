name: CI

# Run formatting, lint, and test checks on every push and pull request so a
# broken change is caught before it lands. Edition 2024 needs a recent stable
# Rust (>= 1.85); the GitHub-hosted toolchain tracks current stable.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all
