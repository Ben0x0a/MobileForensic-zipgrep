name: Release

# Build the binary for every supported target on tag push, then publish a
# GitHub release with one archive per platform (tar.gz for Unix, zip for
# Windows) — each containing the binary (simple name) + README + LICENSE —
# plus a SHA256SUMS manifest covering those archives.
#
# Actions are pinned to commit SHAs (not moving tags) so a compromised upstream
# tag cannot silently alter the release pipeline of a forensic tool. The version
# the SHA corresponds to is noted in the trailing comment.
on:
  push:
    tags:
      # Match version tags only (v1.2.3, v0.1.0-rc1), not arbitrary v* names.
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate the release on the same checks CI runs, so a tag pushed off a branch
  # can never publish code that fails fmt/clippy/tests.
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Tests
        run: cargo test --all --locked

  build:
    name: Build ${{ matrix.target }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel sibling targets when one fails — surface every failure.
      fail-fast: false
      matrix:
        # bin_name   = the executable's filename inside the archive (kept simple)
        # asset_stem = the archive's base name (carries the platform)
        # archive    = tar.gz (Unix, preserves the +x bit) or zip (Windows)
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: mf-zipgrep
            asset_stem: mf-zipgrep-linux-x86_64
            archive: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: mf-zipgrep.exe
            asset_stem: mf-zipgrep-windows-x86_64
            archive: zip

          - os: macos-latest
            target: x86_64-apple-darwin
            bin_name: mf-zipgrep
            asset_stem: mf-zipgrep-macos-x86_64
            archive: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: mf-zipgrep
            asset_stem: mf-zipgrep-macos-aarch64
            archive: tar.gz

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # --locked builds against the committed Cargo.lock for reproducibility.
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Stage the binary (under its simple name) with the docs in a folder named
      # after the platform, so extraction yields a clean, self-describing dir.
      # shell: bash so this runs identically on the Windows runner.
      - name: Stage archive contents
        shell: bash
        run: |
          mkdir "${{ matrix.asset_stem }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "${{ matrix.asset_stem }}/"
          cp README.md LICENSE "${{ matrix.asset_stem }}/"

      # Unix: tar.gz preserves the executable bit. COPYFILE_DISABLE stops macOS
      # tar from injecting AppleDouble (._*) metadata files into the archive.
      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: COPYFILE_DISABLE=1 tar -czf "${{ matrix.asset_stem }}.tar.gz" "${{ matrix.asset_stem }}"

      # Windows: Compress-Archive is built into PowerShell (no `zip` in Git Bash).
      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.asset_stem }}" -DestinationPath "${{ matrix.asset_stem }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset_stem }}.${{ matrix.archive }}
          path: ${{ matrix.asset_stem }}.${{ matrix.archive }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      # Flatten the per-artifact folders into one dir and hash every archive, so
      # downloaders can verify integrity (important for a forensic tool).
      - name: Collect archives and compute checksums
        run: |
          mkdir dist
          find artifacts -type f -exec cp {} dist/ \;
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          # Auto-build the release body from merged PRs/commits since the
          # previous tag (no manual changelog to maintain).
          generate_release_notes: true
          # Tags carrying a pre-release suffix (e.g. v0.1.0-rc1) are flagged.
          prerelease: ${{ contains(github.ref_name, '-') }}
